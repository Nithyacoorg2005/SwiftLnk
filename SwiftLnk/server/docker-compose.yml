services:
  postgres:
    image: postgres:15-alpine
    container_name: url_shortener_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shortener
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: url_shortener_cache
    ports:
      - "6379:6379"

volumes:
  pgdata: